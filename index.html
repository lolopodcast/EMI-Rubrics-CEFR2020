<!-- Domain Lock + Iframe Busting (runs before React) -->
<script>
(function(){
  const ALLOWED = ['lolopodcast.github.io','localhost','127.0.0.1'];
  const REDIRECT = 'https://www.ibs.ncnu.edu.tw/index.php/faculty/tenured-professor/299-smlo';
  if (!ALLOWED.some(d => location.hostname === d || location.hostname.endsWith('.'+d))) {
    document.body.innerHTML = '<div style="text-align:center;padding:60px;font-family:sans-serif"><h1>Access Denied</h1><p>This resource is not authorised on this domain.</p></div>';
    setTimeout(() => location.href = REDIRECT, 3000);
    throw new Error('Domain not authorised');
  }
  if (window.self !== window.top) {
    try { window.top.location.href = window.self.location.href; }
    catch(e) { document.body.innerHTML = '<div style="text-align:center;padding:60px"><h1>Frame Blocked</h1><p>This content cannot be embedded.</p></div>'; }
  }
})();
</script>

const COPYRIGHT_MSG = 'Intellectual Property of Prof. Shihmin Lo';
let showCopyrightToastFn = null;
function showCopyrightToast() { if (showCopyrightToastFn) showCopyrightToastFn(); }

document.addEventListener('contextmenu', e => {
  const selection = window.getSelection().toString().trim();
  const isImage = e.target.tagName === 'IMG' || e.target.closest('svg');
  if (selection.length > 0) return true;
  if (isImage) { e.preventDefault(); showCopyrightToast(); return; }
  e.preventDefault();
  showCopyrightToast();
});

document.addEventListener('keydown', e => {
  if (e.key === 'F12') { e.preventDefault(); showCopyrightToast(); return; }
  if (e.ctrlKey && e.key.toLowerCase() === 'u') { e.preventDefault(); showCopyrightToast(); return; }
  if (e.ctrlKey && e.shiftKey && ['i','j','c'].includes(e.key.toLowerCase())) { e.preventDefault(); showCopyrightToast(); return; }
});

document.addEventListener('dragstart', e => {
  if (e.target.tagName === 'IMG' || e.target.closest('svg')) e.preventDefault();
});

// Deterministic shuffle seeded by construct name so order is stable across renders
// but differs per construct (avoids every construct showing items in level order).
function seededShuffle(arr, seedStr) {
  let seed = 0;
  for (let i = 0; i < seedStr.length; i++) seed = (seed * 31 + seedStr.charCodeAt(i)) >>> 0;
  const rand = () => {
    seed = (seed * 1103515245 + 12345) >>> 0;
    return seed / 4294967296;
  };
  const out = [...arr];
  for (let i = out.length - 1; i > 0; i--) {
    const j = Math.floor(rand() * (i + 1));
    [out[i], out[j]] = [out[j], out[i]];
  }
  return out;
}

const SelfResultBanner = ({ answers, t }) => {
  const countY = (lvl) => [0,1,2,3,4].filter(i => answers.get(`${lvl}-${i}`) === 'Y').length;
  const achievedLevels = LEVELS.filter(lvl => countY(lvl) >= 4);

  if (achievedLevels.length === 0) {
    return (
      <div className="rounded-xl border-2 border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 p-5 mt-6 text-center animate-fade-in">

        <p className="text-sm text-slate-500 dark:text-slate-400">{t.self_result_none}</p>
      </div>
    );
  }

  // Highest fully-achieved level = lowest index in LEVELS order (since LEVELS is highest-to-lowest)
  const highestIdx = Math.min(...achievedLevels.map(l => LEVELS.indexOf(l)));
  const highestLevel = LEVELS[highestIdx];

  // Check transition: does the next-higher level (idx - 1) have 2-3 checked?
  let transitionLabel = null;
  if (highestIdx > 0) {
    const upperLevel = LEVELS[highestIdx - 1];
    const upperCount = countY(upperLevel);
    if (upperCount >= 2 && upperCount <= 3) {
      transitionLabel = { lower: t[`level_${highestLevel}_tag`], upper: t[`level_${upperLevel}_tag`] };

  const c = LEVEL_COLORS[highestLevel];
  return (
    <div className={`rounded-xl border-2 ${c.border} bg-white dark:bg-slate-800 p-5 mt-6 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 animate-fade-in`}>

// ============================================================
// MAIN APP
// ============================================================
function App() {
  const LS_SELF = 'EMI_RUBRICS_self_assessment_answers';
  const LS_SUBMITTED = 'EMI_RUBRICS_self_assessment_submitted';
  const LS_AI = 'EMI_RUBRICS_ai_disclosure';
  const loadLS = (key, fb) => { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fb; } catch { return fb; } };

  const [lang, setLang] = useState('en');
  const [isDark, setIsDark] = useState(true);
  const [mode, setMode] = useState('teacher'); // 'teacher' | 'self'
  const [construct, setConstruct] = useState('listening');
  const [menuOpen, setMenuOpen] = useState(false);
  const [ttsState, setTtsState] = useState('idle');
  // answers: { "construct:levelKey-idx": "Y" | "N" }
  const [answers, setAnswers] = useState(() => loadLS(LS_SELF, {}));
  // submitted: { construct: true }
  const [submitted, setSubmitted] = useState(() => loadLS(LS_SUBMITTED, {}));
  const [aiDisclosure, setAiDisclosure] = useState(() => loadLS(LS_AI, { used: false, purpose: '', revision: '' }));
  const menuRef = useRef(null);
  const t = dict[lang];

  useEffect(() => { document.documentElement.classList.toggle('dark', isDark); }, [isDark]);
  useEffect(() => { try { localStorage.setItem(LS_SELF, JSON.stringify(answers)); } catch {} }, [answers]);
  useEffect(() => { try { localStorage.setItem(LS_SUBMITTED, JSON.stringify(submitted)); } catch {} }, [submitted]);
  useEffect(() => { try { localStorage.setItem(LS_AI, JSON.stringify(aiDisclosure)); } catch {} }, [aiDisclosure]);

  useEffect(() => {
    const handleClickOutside = (e) => { if (menuRef.current && !menuRef.current.contains(e.target)) setMenuOpen(false); };
    document.addEventListener('mousedown', handleClickOutside);
    return () => document.removeEventListener('mousedown', handleClickOutside);
  }, []);

  const setAnswer = (key, value) => {
    const fullKey = `${construct}:${key}`;
    setAnswers(prev => ({ ...prev, [fullKey]: value }));
  };
  const constructAnswers = {
    get: (key) => answers[`${construct}:${key}`]
  };
  const isSubmitted = !!submitted[construct];
  const submitConstruct = () => setSubmitted(prev => ({ ...prev, [construct]: true }));
  const resetConstruct = () => {
    setAnswers(prev => {
      const next = { ...prev };
      Object.keys(next).forEach(k => { if (k.startsWith(`${construct}:`)) delete next[k]; });
      return next;
    });
    setSubmitted(prev => { const next = { ...prev }; delete next[construct]; return next; });
  };

  const toggleLanguage = () => { setLang(l => l === 'en' ? 'zh' : 'en'); stopTTS(); };
  const toggleTheme = () => setIsDark(d => !d);
  const stopTTS = () => { if ('speechSynthesis' in window) speechSynthesis.cancel(); setTtsState('idle'); };


  const handleTTS = (action) => {
    if (!('speechSynthesis' in window)) return;
    if (action === 'stop') { stopTTS(); return; }
    if (action === 'pause') { speechSynthesis.pause(); setTtsState('paused'); return; }
    if (action === 'play') {
      if (ttsState === 'paused') { speechSynthesis.resume(); setTtsState('playing'); return; }
      speechSynthesis.cancel();
      const sep = lang === 'zh' ? '。 ' : '. ';
      let texts;
      if (construct === 'ai-principles') {
        texts = [
          t.ai_section_title, t.ai_section_intro,
          t.ai_rule_lr_title, t.ai_rule_lr_desc,
          t.ai_rule_pd_title, t.ai_rule_pd_desc,
          t.ai_rule_w_title, t.ai_rule_w_desc,
          t.ai_section_quote
        ];
      } else {
        const c = t.constructs[construct];
        texts = [t[`tab_${construct}`]];
        LEVELS.forEach(lvl => {
          texts.push(t[`level_${lvl}_tag`] + ' ' + t[`level_${lvl}`]);
          if (mode === 'teacher') {
            texts.push(c.teacher[lvl]);
          } else {
            texts.push(...c.self[lvl]);
          }
        });
      }
      texts = texts.filter(Boolean);
      const utt = new SpeechSynthesisUtterance(texts.join(sep));
      utt.rate = 0.95;
      const voices = speechSynthesis.getVoices();
      if (lang === 'zh') {
        const v = voices.find(v=>v.lang==='zh-TW'&&v.name.includes('Yating')) || voices.find(v=>v.lang==='zh-TW') || voices.find(v=>v.lang.startsWith('zh'));
        if (v) utt.voice = v; utt.lang = 'zh-TW';
      } else {
        const v = voices.find(v=>v.lang==='en-GB'&&(v.name.includes('Male')||v.name.includes('Daniel'))) || voices.find(v=>v.lang==='en-GB') || voices.find(v=>v.lang.startsWith('en'));
        if (v) utt.voice = v; utt.lang = 'en-GB';
      }
      utt.onend = () => setTtsState('idle');
      utt.onerror = () => setTtsState('idle');
      speechSynthesis.speak(utt);
      setTtsState('playing');
    }
  };

  const constructData = construct === 'ai-principles' ? null : t.constructs[construct];
  const goHome = () => { setConstruct('listening'); setMode('teacher'); setMenuOpen(false); window.scrollTo({top:0,behavior:'smooth'}); };

  return (
    <div className="min-h-screen flex flex-col">
      <CopyrightToast />

      {/* HEADER */}
      <header className="fixed top-0 left-0 right-0 h-16 bg-[#004030] dark:bg-slate-900 text-white z-50 shadow-lg border-b border-[#D8C3A5]/30">
        <div className="max-w-7xl mx-auto px-3 sm:px-4 h-16 flex items-center justify-between">
          <div className="flex items-center gap-1 sm:gap-2 min-w-0">
            <div className="relative" ref={menuRef}>
              <button onClick={() => setMenuOpen(!menuOpen)} className="p-2 hover:bg-white/10 rounded-lg"><IconMenu/></button>
              {menuOpen && (
                <div className="absolute top-full left-0 mt-1 w-64 max-w-[calc(100vw-2rem)] max-h-[calc(100vh-5rem)] overflow-y-auto bg-white dark:bg-slate-800 rounded-xl shadow-2xl border border-slate-200 dark:border-slate-700 z-[100]">
                  {PAGES.map((c, i) => {
                    const Ic = PAGE_ICONS[c];
                    return (
                      <button key={c} onClick={() => { setConstruct(c); setMenuOpen(false); window.scrollTo({top:0,behavior:'smooth'}); }}
                        className={`w-full flex items-center gap-3 px-4 py-3 text-sm text-left hover:bg-slate-100 dark:hover:bg-slate-700 ${construct===c ? 'bg-[#004030]/5 dark:bg-[#D8C3A5]/10 font-bold text-[#004030] dark:text-[#D8C3A5]' : 'text-slate-700 dark:text-slate-300'}`}>
                        <Ic size={16}/><span className="text-xs text-slate-400 mr-1">{i+1}.</span><span className="truncate">{t[`tab_${c}`]}</span>
                      </button>
                    );
                  })}
                </div>
              )}
            </div>
            <button onClick={goHome} className="p-2 hover:bg-white/10 rounded-lg"><IconHome size={18}/></button>
            <button onClick={goHome} className="flex items-center gap-2 min-w-0">
              <span className="font-serif font-black text-[#D8C3A5] text-base sm:text-lg tracking-widest shrink-0">{t.brand}</span>
              <span className="hidden md:inline font-serif font-bold text-sm truncate">{t.title}</span>
            </button>
          </div>
          <div className="flex items-center gap-1 sm:gap-2 shrink-0">
            <div className="flex items-center bg-black/20 rounded-full px-2.5 sm:px-3 py-1 gap-2 sm:gap-3 border border-[#D8C3A5]/30">
              {ttsState === 'playing'
                ? <button onClick={() => handleTTS('pause')} className="text-[#D8C3A5] hover:scale-110 transition"><IconPause/></button>
                : <button onClick={() => handleTTS('play')} className="text-[#D8C3A5] hover:scale-110 transition"><IconPlay/></button>}
              <button onClick={() => handleTTS('stop')} className="text-[#D8C3A5] hover:scale-110 transition"><IconSquare/></button>
            </div>
            <button onClick={toggleLanguage} className="text-[10px] sm:text-[11px] font-bold px-2 py-1.5 border border-[#D8C3A5] text-[#D8C3A5] rounded-sm hover:bg-[#D8C3A5]/10">
              {lang === 'en' ? '中文' : 'EN'}
            </button>
            <button onClick={toggleTheme} className="p-2 text-[#D8C3A5]">{isDark ? <IconSun/> : <IconMoon/>}</button>
          </div>
        </div>
      </header>

      {/* MAIN */}
      <main className="flex-1 pt-16 pb-12">
        <div className="max-w-7xl mx-auto px-4 sm:px-6 py-10 sm:py-14">

          {/* Hero */}
          <div className="mb-10 animate-fade-in">
            <p className="text-xs font-bold tracking-[0.2em] uppercase text-[#D8C3A5] mb-3" style={{color:'#a08968'}}>ESAP ASSESSMENT FRAMEWORK</p>
            <h1 className="text-3xl sm:text-4xl md:text-5xl font-serif font-black text-[#004030] dark:text-[#D8C3A5] mb-4">{t.title}</h1>
            <p className="text-sm sm:text-base text-slate-600 dark:text-slate-400 max-w-3xl leading-relaxed">{t.hero_desc}</p>
          </div>

          {/* Mode toggle */}
          {construct !== 'ai-principles' && (
            <div className="flex gap-2 mb-8">
              <button onClick={() => setMode('teacher')}
                className={`px-5 py-2.5 text-sm font-bold rounded-lg border transition ${mode==='teacher' ? 'bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] border-[#004030] dark:border-[#D8C3A5]' : 'border-slate-300 dark:border-slate-600 text-slate-600 dark:text-slate-400 hover:border-[#004030] dark:hover:border-[#D8C3A5]'}`}>
                {t.mode_teacher}
              </button>
              <button onClick={() => setMode('self')}
                className={`px-5 py-2.5 text-sm font-bold rounded-lg border transition ${mode==='self' ? 'bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] border-[#004030] dark:border-[#D8C3A5]' : 'border-slate-300 dark:border-slate-600 text-slate-600 dark:text-slate-400 hover:border-[#004030] dark:hover:border-[#D8C3A5]'}`}>
                {t.mode_self}
              </button>
            </div>
          )}

          {/* Page tabs (5 constructs + AI principles) */}
          <div className="flex flex-wrap gap-2 mb-8">
            {PAGES.map((c, i) => {
              const Ic = PAGE_ICONS[c];
              return (
                <button key={c} onClick={() => setConstruct(c)}
                  className={`flex items-center gap-2 px-4 sm:px-5 py-2.5 text-xs sm:text-sm font-bold rounded-lg border transition ${construct===c ? 'bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] border-[#004030] dark:border-[#D8C3A5]' : 'border-slate-300 dark:border-slate-600 text-slate-600 dark:text-slate-400 hover:border-[#004030] dark:hover:border-[#D8C3A5]'}`}>
                  <Ic size={14}/> {t[`tab_${c}`]}
                </button>
              );
            })}
          </div>

          {construct === 'ai-principles' ? (
            <AITransparencySection t={t} />
          ) : (
            <>
              {/* Self-assessment instructions */}
              {mode === 'self' && <SelfInstructions t={t} />}

              {/* Content */}
              {mode === 'teacher' ? (
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-5" key={`${construct}-${mode}`}>
                  {LEVELS.map((lvl, idx) => {
                    const isLowest = idx === LEVELS.length - 1;
                    return (
                      <TeacherLevelCard key={lvl} levelKey={lvl}
                        label={t[`level_${lvl}`]} tag={t[`level_${lvl}_tag`]}
                        text={constructData.teacher[lvl]}
                        isLowest={isLowest} note={t.level_belowb1_note} />
                    );
                  })}
                </div>
              ) : (
                <div key={`${construct}-${mode}`}>
                  <MixedSelfAssessment construct={construct} constructData={constructData}
                    answers={constructAnswers} onAnswer={setAnswer} t={t}
                    isSubmitted={isSubmitted} onSubmit={submitConstruct} onReset={resetConstruct} />
                </div>
              )}

              {/* AI Disclosure form — only on Writing construct, self mode */}
              {mode === 'self' && construct === 'writing' && (
                <AIDisclosureForm t={t} value={aiDisclosure} onChange={setAiDisclosure} />
              )}
            </>
          )}

        </div>
      </main>

      {/* FOOTER */}
      <footer className="h-14 bg-[#004030] flex items-center justify-between px-4 sm:px-6 shrink-0">
        <span className="text-[#D8C3A5]/60 text-[10px] sm:text-xs">{t.date} · {t.copyright}</span>
        <span className="text-[#D8C3A5]/60 text-[10px] sm:text-xs flex items-center gap-3">
          <span>{t.architect_label}&nbsp;<a href={t.architect_url} target="_blank" rel="noopener noreferrer" className="text-[#D8C3A5] hover:text-white underline">{t.architect_name}</a></span>
          <button onClick={() => window.scrollTo({top:0,behavior:'smooth'})} className="text-[#D8C3A5] hover:text-white font-bold">Top ↑</button>
        </span>
      </footer>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

</script>

</body>
</html>
